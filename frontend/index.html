<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADB管理工具 - 日常/截图/设置</title>
    <style>
        /* ========== 主题变量定义 ========== */
        :root {
            /* 暗色主题（默认） */
            --bg-root: #0d0f14;
            --bg-primary: #13161e;
            --bg-secondary: #1a1e29;
            --bg-tertiary: #212636;
            --bg-card: #282e3c;
            --bg-hover: #2f3646;
            --border: #2a3040;
            --border-light: #363d50;
            --text-primary: #e8ebf2;
            --text-secondary: #a0a6b8;
            --text-muted: #6a6f80;
            --accent: #5b8def;
            --accent-hover: #7aa5ff;
            --accent-subtle: rgba(91, 141, 239, 0.1);
            --success: #34c77b;
            --warning: #f5a623;
            --danger: #f04770;
            --scrollbar-thumb: #363d50;
            --canvas-bg: #0a0c12;
            --rect-stroke: #5b8def;
            --rect-selected-stroke: #34c77b;
            --rect-fill: rgba(91, 141, 239, 0.12);
            --rect-selected-fill: rgba(52, 199, 123, 0.15);
        }

        /* 亮色主题 */
        body.light-theme {
            --bg-root: #f0f2f5;
            --bg-primary: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-tertiary: #eef0f4;
            --bg-card: #ffffff;
            --bg-hover: #e8ebf0;
            --border: #d1d5db;
            --border-light: #e2e5ea;
            --text-primary: #1a1d26;
            --text-secondary: #4b5563;
            --text-muted: #8b919e;
            --accent: #3b6fd4;
            --accent-hover: #5a8aee;
            --accent-subtle: rgba(59, 111, 212, 0.08);
            --success: #1ca35a;
            --warning: #c7860e;
            --danger: #d93651;
            --scrollbar-thumb: #c4c9d4;
            --canvas-bg: #e8ecf1;
            --rect-stroke: #3b6fd4;
            --rect-selected-stroke: #1ca35a;
            --rect-fill: rgba(59, 111, 212, 0.15);
            --rect-selected-fill: rgba(28, 163, 90, 0.18);
        }

        /* 暖色主题 */
        body.warm-theme {
            --bg-root: #1a1410;
            --bg-primary: #241e18;
            --bg-secondary: #2d2620;
            --bg-tertiary: #383028;
            --bg-card: #403830;
            --bg-hover: #4a4038;
            --border: #4a4038;
            --border-light: #5a5048;
            --text-primary: #f0e6d8;
            --text-secondary: #c4b8a8;
            --text-muted: #8a7e70;
            --accent: #e89440;
            --accent-hover: #f0a860;
            --accent-subtle: rgba(232, 148, 64, 0.12);
            --success: #7cb342;
            --warning: #f0a040;
            --danger: #e05555;
            --scrollbar-thumb: #5a5048;
            --canvas-bg: #1a1410;
            --rect-stroke: #e89440;
            --rect-selected-stroke: #7cb342;
            --rect-fill: rgba(232, 148, 64, 0.12);
            --rect-selected-fill: rgba(124, 179, 66, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-root);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: 13px;
            line-height: 1.5;
            transition: background 0.3s, color 0.3s;
        }

        /* ========== 导航栏 ========== */
        .navbar {
            height: 48px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            flex-shrink: 0;
            z-index: 100;
            gap: 2px;
            -webkit-app-region: drag;
            user-select: none;
            transition: background 0.3s, border-color 0.3s;
        }
        .nav-item {
            padding: 7px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            border: 1px solid transparent;
            letter-spacing: 0.2px;
            -webkit-app-region: no-drag;
        }
        .nav-item:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .nav-item.active {
            color: #fff;
            background: var(--accent-subtle);
            border-color: var(--accent);
            font-weight: 600;
        }
        .nav-item.debug-only {
            display: none;
        }
        body.debug-mode .nav-item.debug-only {
            display: block;
        }
        .nav-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-app-region: no-drag;
        }
        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        .debug-toggle input {
            display: none;
        }
        .debug-toggle .switch {
            width: 34px;
            height: 18px;
            background: var(--bg-tertiary);
            border-radius: 9px;
            position: relative;
            transition: all 0.2s;
            border: 1px solid var(--border-light);
        }
        .debug-toggle .switch::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            background: var(--text-muted);
            border-radius: 50%;
            top: 1.5px;
            left: 2px;
            transition: all 0.2s;
        }
        .debug-toggle input:checked+.switch {
            background: rgba(245, 166, 35, 0.18);
            border-color: var(--warning);
        }
        .debug-toggle input:checked+.switch::after {
            background: var(--warning);
            left: 17px;
        }
        .brand {
            font-weight: 700;
            font-size: 13.5px;
            color: var(--text-primary);
            letter-spacing: 0.3px;
            margin-right: 8px;
            -webkit-app-region: no-drag;
        }
        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
            -webkit-app-region: no-drag;
        }
        .theme-btn:hover {
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        /* ========== 主体布局 ========== */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            height: calc(100vh - 48px);
        }

        /* ========== 左侧面板 ========== */
        .panel-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 320px;
            border-right: 1px solid var(--border);
            background: var(--bg-primary);
            transition: background 0.3s, border-color 0.3s;
        }
        .panel-left .panel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .panel-left .panel-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .panel-left .panel-scroll::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }

        /* ========== 右侧面板 ========== */
        .panel-right {
            width: 360px;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
            border-left: 1px solid var(--border);
            transition: background 0.3s, border-color 0.3s;
        }
        .panel-right .panel-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .panel-right .panel-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .panel-right .panel-scroll::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }

        /* ========== 可收起卡片 ========== */
        .collapsible-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .collapsible-card.open {
            border-color: var(--border-light);
        }
        .card-header {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            cursor: pointer;
            user-select: none;
            gap: 10px;
            transition: background 0.15s;
            min-height: 44px;
        }
        .card-header:hover {
            background: var(--bg-tertiary);
        }
        .card-arrow {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
            font-size: 10px;
        }
        .collapsible-card.open .card-arrow {
            transform: rotate(90deg);
        }
        .card-title {
            flex: 1;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-status {
            font-size: 10.5px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-status.running {
            background: rgba(52, 199, 123, 0.15);
            color: var(--success);
        }
        .card-status.stopped {
            background: rgba(106, 111, 128, 0.15);
            color: var(--text-muted);
        }
        .card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .btn {
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-light);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
            letter-spacing: 0.2px;
            outline: none;
        }
        .btn:hover {
            background: var(--bg-hover);
            border-color: #4a5368;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-start {
            background: rgba(52, 199, 123, 0.15);
            border-color: var(--success);
            color: var(--success);
            font-weight: 600;
        }
        .btn-start:hover {
            background: rgba(52, 199, 123, 0.25);
        }
        .btn-stop {
            background: rgba(240, 71, 112, 0.15);
            border-color: var(--danger);
            color: var(--danger);
            font-weight: 600;
        }
        .btn-stop:hover {
            background: rgba(240, 71, 112, 0.25);
        }
        .btn-accent {
            background: var(--accent-subtle);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .btn-accent:hover {
            background: rgba(91, 141, 239, 0.2);
        }
        .btn-sm {
            padding: 3px 10px;
            font-size: 10.5px;
            border-radius: 4px;
        }
        .btn-xs {
            padding: 2px 7px;
            font-size: 10px;
            border-radius: 3px;
        }

        .card-body {
            display: none;
            padding: 0 14px 12px;
            flex-direction: column;
            gap: 8px;
        }
        .collapsible-card.open .card-body {
            display: flex;
        }

        /* ========== 表格样式 ========== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .table-wrapper::-webkit-scrollbar {
            height: 3px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            white-space: nowrap;
        }
        table th,
        table td {
            padding: 7px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        table th {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        table tbody tr:hover {
            background: var(--bg-hover);
        }
        table tbody tr:last-child td {
            border-bottom: none;
        }
        .editable-cell {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-primary);
            padding: 3px 6px;
            border-radius: 3px;
            width: 100%;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }
        .editable-cell:hover {
            border-color: var(--border-light);
        }
        .editable-cell:focus {
            border-color: var(--accent);
            background: var(--bg-primary);
        }
        .add-row-btn {
            margin-top: 6px;
            font-size: 11px;
            cursor: pointer;
            color: var(--accent);
            background: none;
            border: none;
            padding: 4px 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .add-row-btn:hover {
            color: var(--accent-hover);
        }
        .delete-row-btn {
            color: var(--danger);
            cursor: pointer;
            background: none;
            border: 1px solid transparent;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .delete-row-btn:hover {
            background: rgba(240, 71, 112, 0.15);
            border-color: var(--danger);
        }

        /* ========== ADB连接状态区域 ========== */
        .adb-status-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            flex-shrink: 0;
        }
        .adb-status-card .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .adb-status-card .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .adb-status-card .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 6px rgba(52, 199, 123, 0.5);
        }
        .adb-status-card .status-dot.disconnected {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(240, 71, 112, 0.5);
        }
        .adb-status-card .device-info {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        /* ========== 实时截图区 ========== */
        .live-screenshot-area {
            background: var(--canvas-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            aspect-ratio: 9/19;
            max-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.3s;
        }
        .live-screenshot-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .live-screenshot-area .placeholder {
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
        }

        /* ========== ROI编辑器画布 ========== */
        .roi-editor-wrapper {
            background: var(--canvas-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .roi-editor-wrapper canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            cursor: crosshair;
        }
        .roi-toolbar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 4px 0;
        }
        .roi-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .roi-list::-webkit-scrollbar {
            width: 3px;
        }
        .roi-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }
        .roi-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .roi-item:hover {
            border-color: var(--border-light);
        }
        .roi-item.selected {
            border-color: var(--rect-selected-stroke);
            background: var(--rect-selected-fill);
        }
        .roi-item .roi-name {
            font-weight: 600;
            font-size: 11px;
        }
        .roi-item .roi-coords {
            font-size: 10px;
            color: var(--text-muted);
            font-family: monospace;
        }
        .roi-item .roi-actions {
            display: flex;
            gap: 4px;
        }

        /* ========== 日志区域 ========== */
        .log-container {
            background: var(--canvas-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 10.5px;
            color: var(--text-secondary);
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .log-container::-webkit-scrollbar {
            width: 3px;
        }
        .log-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }
        .log-line {
            padding: 1px 0;
        }
        .log-line.warn {
            color: var(--warning);
        }
        .log-line.error {
            color: var(--danger);
        }
        .log-line.info {
            color: var(--accent);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            padding: 20px;
            gap: 8px;
            font-size: 12px;
            text-align: center;
        }
        .empty-state .icon {
            font-size: 36px;
            opacity: 0.4;
        }

        /* ========== Toast通知 ========== */
        .toast-container {
            position: fixed;
            top: 60px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.2s ease-out, fadeOut 0.3s ease-in forwards;
            animation-delay: 0s, 2.2s;
            pointer-events: auto;
            max-width: 350px;
        }
        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }
    </style>
</head>
<body class="">

    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar">
        <span class="brand">⚡ ADB Tool</span>
        <div class="nav-item active" data-nav="daily">📋 日常</div>
        <div class="nav-item debug-only" data-nav="screenshot">📸 截图</div>
        <div class="nav-item" data-nav="settings">⚙️ 设置</div>
        <div class="nav-right">
            <button class="theme-btn" id="btnToggleTheme" title="切换主题颜色">🎨</button>
            <label class="debug-toggle" title="启用调试模式以显示截图导航">
                <input type="checkbox" id="debugModeToggle">
                <span class="switch"></span>
                <span>Debug</span>
            </label>
        </div>
    </nav>

    <!-- ==================== 主体布局 ==================== -->
    <div class="main-container">

        <!-- ========== 左侧：日常 / 截图 / 设置 内容区 ========== -->
        <div class="panel-left" id="panelLeft">
            <div class="panel-scroll" id="leftContent">
                <!-- 动态渲染 -->
            </div>
        </div>

        <!-- ========== 右侧：ADB状态 / 实时截图 / ROI编辑器 / 日志 ========== -->
        <div class="panel-right" id="panelRight">
            <div class="panel-scroll" id="rightContent">
                <!-- ADB连接状态卡片 -->
                <div class="adb-status-card" id="adbStatusCard">
                    <div class="status-row">
                        <span style="display:flex;align-items:center;gap:8px;">
                            <span class="status-dot disconnected" id="adbStatusDot"></span>
                            <span style="font-weight:600;">ADB 连接状态</span>
                        </span>
                        <button class="btn btn-sm" id="btnRefreshAdb">🔄 刷新</button>
                    </div>
                    <div class="device-info" id="adbDeviceInfo">未连接设备</div>
                </div>

                <!-- 实时截图 -->
                <div class="collapsible-card open" id="liveScreenshotCard">
                    <div class="card-header" onclick="toggleCard('liveScreenshotCard')">
                        <span class="card-arrow">▶</span>

    <script>
        // ==================== 主题切换 ====================
        const themes = ['', 'light-theme', 'warm-theme'];
        const themeIcons = ['🌙', '☀️', '🔥'];
        let currentThemeIndex = 0;

        function loadTheme() {
            const saved = localStorage.getItem('adb_tool_theme');
            if (saved !== null) {
                currentThemeIndex = parseInt(saved);
                if (currentThemeIndex >= themes.length) currentThemeIndex = 0;
            }
            applyTheme();
        }

        function applyTheme() {
            document.body.classList.remove('light-theme', 'warm-theme');
            if (themes[currentThemeIndex]) {
                document.body.classList.add(themes[currentThemeIndex]);
            }
            const btn = document.getElementById('btnToggleTheme');
            if (btn) {
                btn.textContent = themeIcons[currentThemeIndex];
                btn.title = `主题: ${['暗色', '亮色', '暖色'][currentThemeIndex]} - 点击切换`;
            }
        }

        function cycleTheme() {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            localStorage.setItem('adb_tool_theme', currentThemeIndex);
            applyTheme();
            addLog(`主题已切换为: ${['暗色', '亮色', '暖色'][currentThemeIndex]}`, 'info');
        }

        document.getElementById('btnToggleTheme')?.addEventListener('click', cycleTheme);

        // ==================== 导航切换逻辑 ====================
        const navItems = document.querySelectorAll('.nav-item[data-nav]');

            document.body.classList.add('debug-mode');

        }

        debugToggle.addEventListener('change', () => {
            debugMode = debugToggle.checked;
            if (debugMode) {
                document.body.classList.add('debug-mode');
            } else {
                document.body.classList.remove('debug-mode');
                if (currentNav === 'screenshot') {
                    switchNav('daily');

            localStorage.setItem('adb_debug_mode', debugMode);

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const nav = item.dataset.nav;

                switchNav(nav);

                <div class="collapsible-card open" data-card="settingsAdb">
                    <div class="card-header" onclick="toggleCard('settingsAdb')">
                        <span class="card-arrow">▶</span>
                        <span class="card-title">🔌 ADB连接设置</span>
                    </div>
                    <div class="card-body">

        function bindLeftEvents() {}

        // ==================== 卡片折叠 ====================
        function toggleCard(cardId) {
            const card = document.querySelector(`[data-card="${cardId}"]`) || document.getElementById(cardId);
            if (card) card.classList.toggle('open');
        }

        // ==================== 任务启停 ====================
        function toggleTask(taskId) {
            const statusEl = document.getElementById(`status-${taskId}`);
            const cardEl = document.querySelector(`[data-card="${taskId}"]`);
            if (!statusEl) return;
            if (statusEl.textContent.includes('运行中')) {
                statusEl.textContent = '已停止';
                statusEl.className = 'card-status stopped';
                if (cardEl) {
                    const btn = cardEl.querySelector('.card-actions button');
                    if (btn) { btn.textContent = '▶ 开始';
                        btn.className = 'btn btn-start btn-sm'; }
                }
                addLog(`任务 ${taskId} 已停止`, 'warn');
            } else {
                statusEl.textContent = '运行中';
                statusEl.className = 'card-status running';
                if (cardEl) {
                    const btn = cardEl.querySelector('.card-actions button');
                    if (btn) { btn.textContent = '⏹ 停止';
                        btn.className = 'btn btn-stop btn-sm'; }
                }
                addLog(`任务 ${taskId} 已启动`, 'info');
            }
        }

        function addRow(tableId) {
            const tbody = document.getElementById(tableId);
            if (!tbody) return;
            const row = tbody.insertRow();
            const headers = tbody.closest('table').querySelectorAll('th');
            const colCount = headers.length;
            let html = '';
            for (let i = 0; i < colCount - 1; i++) {
                const headerText = headers[i].textContent.trim();
                const field = headerText.includes('坐标X') ? 'x' : headerText.includes('坐标Y') ? 'y' : headerText.includes(
                    '等待') ? 'wait' : headerText.includes('重复') ? 'repeat' : headerText.includes('应用') ? 'app' :
                    headerText.includes('包名') ? 'pkg' : headerText.includes('操作') ? 'action' : 'field';
                const type = ['x', 'y', 'wait', 'repeat'].includes(field) ? 'number' : 'text';
                html += `<td><input class="editable-cell" value="" data-field="${field}" type="${type}"></td>`;
            }
            html += '<td><button class="delete-row-btn" onclick="deleteRow(this)">×</button></td>';
            row.innerHTML = html;
        }

        function deleteRow(btn) {
            const row = btn.closest('tr');
            if (row && row.parentElement.querySelectorAll('tr').length > 1) row.remove();
        }

        // ==================== Toast ====================
        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2600);
        }

        // ==================== 日志系统 ====================
        const MAX_LOG_LINES = 1000;
        let logLines = ['[系统] 应用已启动'];

        function addLog(message, type = '') {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            logLines.push(`[${timestamp}] ${message}`);
            if (logLines.length > MAX_LOG_LINES) {
                logLines = logLines.slice(logLines.length - MAX_LOG_LINES);
            }
            renderLogs();
        }

        function renderLogs() {
            const logContainer = document.getElementById('logContainer');
            const logCount = document.getElementById('logCount');
            if (!logContainer || !logCount) return;
            const linesToRender = logLines.slice(-MAX_LOG_LINES);
            logContainer.innerHTML = linesToRender.map(line => {
                let cls = '';
                if (line.includes('warn') || line.includes('警告') || line.includes('停止')) cls = 'warn';
                if (line.includes('error') || line.includes('错误') || line.includes('失败')) cls = 'error';
                if (line.includes('info') || line.includes('启动') || line.includes('成功') || line.includes('已切换'))
                    cls = 'info';
                return `<span class="log-line ${cls}">${line}</span>`;
            }).join('\n');
            logContainer.scrollTop = logContainer.scrollHeight;
            logCount.textContent = `${linesToRender.length}条`;
        }

        // ==================== 截图 ====================
        function captureScreenshot() {
            const area = document.getElementById('liveScreenshotArea');
            if (area) {
                area.innerHTML = '<span class="placeholder" style="color:var(--warning);">模拟截图获取中...</span>';
                setTimeout(() => {
                    area.innerHTML =
                        '<span class="placeholder">📱 截图预览区<br><small style="color:var(--text-muted);">实际接入ADB后显示实时截图</small></span>';
                }, 1500);
            }
            addLog('截图请求已发送', 'info');
        }

        // ==================== ADB状态 ====================
        function refreshAdbStatus() {
            const dot = document.getElementById('adbStatusDot');
            const info = document.getElementById('adbDeviceInfo');
            const connected = Math.random() > 0.3;
            if (dot && info) {
                if (connected) {
                    dot.className = 'status-dot connected';
                    info.textContent = '✅ 设备: emulator-5554 | Android 13 | 1080×2400';
                } else {
                    dot.className = 'status-dot disconnected';
                    info.textContent = '⚠️ 未检测到设备';
                }
            }
        }
        document.getElementById('btnRefreshAdb')?.addEventListener('click', refreshAdbStatus);

        // ==================== ROI编辑器核心 ====================
        const roiCanvas = document.getElementById('roiCanvas');
        const roiCtx = roiCanvas.getContext('2d');
        const roiWrapper = document.getElementById('roiEditorWrapper');
        const roiPlaceholder = document.getElementById('roiPlaceholder');
        const roiListEl = document.getElementById('roiList');
        const roiCountEl = document.getElementById('roiCount');

        let roiImage = null;
        let roiImageNaturalW = 400;
        let roiImageNaturalH = 600;
        let roiDisplayScale = 1;
        let roiRectangles = [];
        let selectedRoiId = null;
        let isDrawingRoi = false;
        let isDraggingRoi = false;
        let isResizingRoi = false;
        let dragStartCanvas = null;
        let dragStartRect = null;
        let resizeHandle = null;
        let drawingRoiRect = null;
        const ROI_MIN_SIZE = 8;
        const ROI_HANDLE_SIZE = 8;

        function roiGenId() { return 'roi_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }

        function canvasToOriginal(cx, cy) {
            return { x: Math.round((cx) / roiDisplayScale * 100) / 100, y: Math.round((cy) / roiDisplayScale * 100) /
                100 };
        }

        function originalToCanvas(ox, oy) {
            return { x: ox * roiDisplayScale, y: oy * roiDisplayScale };
        }

        function updateRoiDisplay() {
            if (!roiImage) {
                roiCanvas.width = 400;
                roiCanvas.height = 600;
                roiDisplayScale = 1;
                roiPlaceholder.style.display = 'flex';
                return;
            }
            roiPlaceholder.style.display = 'none';
            roiImageNaturalW = roiImage.naturalWidth;
            roiImageNaturalH = roiImage.naturalHeight;
            const maxW = roiWrapper.clientWidth - 4;
            const maxH = Math.min(500, roiWrapper.clientHeight - 4);
            let displayW = roiImageNaturalW;
            let displayH = roiImageNaturalH;
            if (displayW > maxW || displayH > maxH) {
                const scale = Math.min(maxW / displayW, maxH / displayH);
                displayW = Math.floor(displayW * scale);
                displayH = Math.floor(displayH * scale);
            }
            roiCanvas.width = roiImageNaturalW;
            roiCanvas.height = roiImageNaturalH;
            roiCanvas.style.width = displayW + 'px';
            roiCanvas.style.height = displayH + 'px';
            roiDisplayScale = displayW / roiImageNaturalW;
            renderRoiCanvas();
        }

        function renderRoiCanvas() {
            roiCtx.clearRect(0, 0, roiCanvas.width, roiCanvas.height);
            if (!roiImage) {
                roiCtx.fillStyle = getComputedStyle(document.body).getPropertyValue('--canvas-bg').trim() || '#0a0c12';
                roiCtx.fillRect(0, 0, roiCanvas.width, roiCanvas.height);
                return;
            }
            roiCtx.drawImage(roiImage, 0, 0, roiImageNaturalW, roiImageNaturalH);

            roiRectangles.forEach(rect => {
                const isSelected = rect.id === selectedRoiId;
                roiCtx.fillStyle = isSelected ? 'rgba(52,199,123,0.15)' : 'rgba(91,141,239,0.12)';
                roiCtx.fillRect(rect.x, rect.y, rect.width, rect.height);
                roiCtx.lineWidth = isSelected ? 2.5 : 1.5;
                roiCtx.strokeStyle = isSelected ? '#34c77b' : '#5b8def';
                roiCtx.setLineDash([]);
                roiCtx.strokeRect(rect.x, rect.y, rect.width, rect.height);

                const label = rect.name || rect.id;
                roiCtx.fillStyle = '#fff';
                roiCtx.font = 'bold 11px sans-serif';
                roiCtx.fillText(label, rect.x + 3, rect.y - 4 > 11 ? rect.y - 4 : rect.y + rect.height + 14);

                if (isSelected) {
                    const hs = ROI_HANDLE_SIZE / roiDisplayScale;
                    const handles = [
                        { x: rect.x, y: rect.y }, { x: rect.x + rect.width / 2, y: rect.y }, { x: rect.x + rect
                            .width, y: rect.y },
                        { x: rect.x + rect.width, y: rect.y + rect.height / 2 }, { x: rect.x + rect.width, y: rect.y +
                            rect.height },
                        { x: rect.x + rect.width / 2, y: rect.y + rect.height }, { x: rect.x, y: rect.y + rect.height },
                        { x: rect.x, y: rect.y + rect.height / 2 }
                    ];
                    handles.forEach(h => {
                        roiCtx.fillStyle = '#fff';
                        roiCtx.fillRect(h.x - hs / 2, h.y - hs / 2, hs, hs);
                        roiCtx.strokeStyle = '#34c77b';
                        roiCtx.lineWidth = 1;
                        roiCtx.strokeRect(h.x - hs / 2, h.y - hs / 2, hs, hs);
                    });
                }
            });

            if (isDrawingRoi && drawingRoiRect) {
                const dr = drawingRoiRect;
                roiCtx.fillStyle = 'rgba(245,166,35,0.08)';
                roiCtx.fillRect(dr.x, dr.y, dr.width, dr.height);
                roiCtx.lineWidth = 2;
                roiCtx.strokeStyle = '#f5a623';
                roiCtx.setLineDash([5, 3]);
                roiCtx.strokeRect(dr.x, dr.y, dr.width, dr.height);
                roiCtx.setLineDash([]);
                roiCtx.fillStyle = '#f5a623';
                roiCtx.font = 'bold 10px sans-serif';
                roiCtx.fillText(`${Math.round(dr.width)}×${Math.round(dr.height)}`, dr.x + 2, dr.y - 6 > 10 ? dr.y - 6 : dr
                    .y + dr.height + 14);
            }
        }

        function getHandleAtRoiPoint(rect, cx, cy) {
            const orig = canvasToOriginal(cx, cy);
            const hs = ROI_HANDLE_SIZE / roiDisplayScale * 1.8;
            const handles = [
                { id: 'nw', x: rect.x, y: rect.y }, { id: 'n', x: rect.x + rect.width / 2, y: rect.y }, { id: 'ne', x: rect
                        .x + rect.width, y: rect.y },
                { id: 'e', x: rect.x + rect.width, y: rect.y + rect.height / 2 }, { id: 'se', x: rect.x + rect.width, y: rect
                        .y + rect.height },
                { id: 's', x: rect.x + rect.width / 2, y: rect.y + rect.height }, { id: 'sw', x: rect.x, y: rect.y + rect
                        .height },
                { id: 'w', x: rect.x, y: rect.y + rect.height / 2 }
            ];
            for (const h of handles) {
                if (Math.abs(orig.x - h.x) < hs && Math.abs(orig.y - h.y) < hs) return h.id;
            }
            return null;
        }

        function findRoiAtPoint(cx, cy) {
            const orig = canvasToOriginal(cx, cy);
            for (let i = roiRectangles.length - 1; i >= 0; i--) {
                const r = roiRectangles[i];
                if (orig.x >= r.x && orig.x <= r.x + r.width && orig.y >= r.y && orig.y <= r.y + r.height) return r;
            }
            return null;
        }

        function getCanvasCoords(e) {
            const rect = roiCanvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (roiCanvas.width / rect.width),
                y: (e.clientY - rect.top) * (roiCanvas.height / rect.height)
            };
        }

        roiCanvas.addEventListener('mousedown', (e) => {
            if (!roiImage) return;
            const coords = getCanvasCoords(e);
            if (selectedRoiId) {
                const selRect = roiRectangles.find(r => r.id === selectedRoiId);
                if (selRect) {
                    const handle = getHandleAtRoiPoint(selRect, coords.x, coords.y);
                    if (handle) {
                        isResizingRoi = true;
                        resizeHandle = handle;
                        dragStartCanvas = coords;
                        dragStartRect = { ...selRect };
                        e.preventDefault();
                        return;
                    }
                }
            }
            const clicked = findRoiAtPoint(coords.x, coords.y);
            if (clicked) {
                selectedRoiId = clicked.id;
                isDraggingRoi = true;
                dragStartCanvas = coords;
                dragStartRect = { ...clicked };
                renderRoiCanvas();
                renderRoiList();
                e.preventDefault();
                return;
            }
            const orig = canvasToOriginal(coords.x, coords.y);
            isDrawingRoi = true;
            drawingRoiRect = { x: orig.x, y: orig.y, width: 0, height: 0 };
            dragStartCanvas = coords;
            selectedRoiId = null;
            renderRoiCanvas();
            renderRoiList();
            e.preventDefault();
        });

        roiCanvas.addEventListener('mousemove', (e) => {
            if (!roiImage) return;
            const coords = getCanvasCoords(e);
            if (isDrawingRoi && drawingRoiRect) {
                const origStart = canvasToOriginal(dragStartCanvas.x, dragStartCanvas.y);
                const origCur = canvasToOriginal(coords.x, coords.y);
                drawingRoiRect.x = Math.min(origStart.x, origCur.x);
                drawingRoiRect.y = Math.min(origStart.y, origCur.y);
                drawingRoiRect.width = Math.abs(origCur.x - origStart.x);
                drawingRoiRect.height = Math.abs(origCur.y - origStart.y);
                renderRoiCanvas();
            } else if (isDraggingRoi && dragStartCanvas && dragStartRect) {
                const origStart = canvasToOriginal(dragStartCanvas.x, dragStartCanvas.y);
                const origCur = canvasToOriginal(coords.x, coords.y);
                const dx = origCur.x - origStart.x;
                const dy = origCur.y - origStart.y;
                updateRect(dragStartRect.id, {
                    x: Math.round(dragStartRect.x + dx),
                    y: Math.round(dragStartRect.y + dy),
                    width: dragStartRect.width,
                    height: dragStartRect.height
                });
                dragStartCanvas = coords;
                dragStartRect = roiRectangles.find(r => r.id === dragStartRect.id) || dragStartRect;
            } else if (isResizingRoi && dragStartCanvas && dragStartRect && resizeHandle) {
                const origStart = canvasToOriginal(dragStartCanvas.x, dragStartCanvas.y);
                const origCur = canvasToOriginal(coords.x, coords.y);
                const dx = origCur.x - origStart.x;
                const dy = origCur.y - origStart.y;
                const sr = dragStartRect;
                let nr = { x: sr.x, y: sr.y, width: sr.width, height: sr.height };
                switch (resizeHandle) {
                    case 'nw':
                        nr.x = sr.x + dx;
                        nr.y = sr.y + dy;
                        nr.width = sr.width - dx;
                        nr.height = sr.height - dy;
                        break;
                    case 'n':
                        nr.y = sr.y + dy;
                        nr.height = sr.height - dy;
                        break;
                    case 'ne':
                        nr.y = sr.y + dy;
                        nr.width = sr.width + dx;
                        nr.height = sr.height - dy;
                        break;
                    case 'e':
                        nr.width = sr.width + dx;
                        break;
                    case 'se':
                        nr.width = sr.width + dx;
                        nr.height = sr.height + dy;
                        break;
                    case 's':
                        nr.height = sr.height + dy;
                        break;
                    case 'sw':
                        nr.x = sr.x + dx;
                        nr.width = sr.width - dx;
                        nr.height = sr.height + dy;
                        break;
                    case 'w':
                        nr.x = sr.x + dx;
                        nr.width = sr.width - dx;
                        break;
                }
                if (nr.width < ROI_MIN_SIZE) nr.width = ROI_MIN_SIZE;
                if (nr.height < ROI_MIN_SIZE) nr.height = ROI_MIN_SIZE;
                updateRect(sr.id, nr);
            }
        });

        roiCanvas.addEventListener('mouseup', () => {
            if (isDrawingRoi && drawingRoiRect && drawingRoiRect.width > ROI_MIN_SIZE && drawingRoiRect.height >
                ROI_MIN_SIZE) {
                const rect = {
                    id: roiGenId(),
                    name: `ROI_${roiRectangles.length + 1}`,
                    x: Math.round(drawingRoiRect.x),
                    y: Math.round(drawingRoiRect.y),
                    width: Math.round(drawingRoiRect.width),
                    height: Math.round(drawingRoiRect.height)
                };
                rect.x = Math.max(0, rect.x);
                rect.y = Math.max(0, rect.y);
                if (rect.x + rect.width > roiImageNaturalW) rect.width = roiImageNaturalW - rect.x;
                if (rect.y + rect.height > roiImageNaturalH) rect.height = roiImageNaturalH - rect.y;
                roiRectangles.push(rect);
                selectedRoiId = rect.id;
                addLog(`ROI已添加: ${rect.name}`, 'info');
                showToast(`ROI已添加: ${rect.name}`);
            }
            isDrawingRoi = false;
            isDraggingRoi = false;
            isResizingRoi = false;
            drawingRoiRect = null;
            dragStartCanvas = null;
            dragStartRect = null;
            resizeHandle = null;
            renderRoiCanvas();
            renderRoiList();
            updateRoiCount();
        });

        function updateRect(rectId, updates) {
            const rect = roiRectangles.find(r => r.id === rectId);
            if (!rect) return;
            Object.assign(rect, updates);
            rect.x = Math.max(0, Math.min(rect.x, roiImageNaturalW - ROI_MIN_SIZE));
            rect.y = Math.max(0, Math.min(rect.y, roiImageNaturalH - ROI_MIN_SIZE));
            rect.width = Math.max(ROI_MIN_SIZE, Math.min(rect.width, roiImageNaturalW - rect.x));
            rect.height = Math.max(ROI_MIN_SIZE, Math.min(rect.height, roiImageNaturalH - rect.y));
            renderRoiCanvas();
            renderRoiList();
        }

        function deleteRoi(rectId) {
            const idx = roiRectangles.findIndex(r => r.id === rectId);
            if (idx < 0) return;
            const name = roiRectangles[idx].name;
            roiRectangles.splice(idx, 1);
            if (selectedRoiId === rectId) selectedRoiId = roiRectangles.length > 0 ? roiRectangles[Math.min(idx,
                roiRectangles.length - 1)].id : null;
            renderRoiCanvas();
            renderRoiList();
            updateRoiCount();
            addLog(`ROI已删除: ${name}`, 'warn');
            showToast(`ROI已删除: ${name}`);
        }

        function renderRoiList() {
            if (roiRectangles.length === 0) {
                roiListEl.innerHTML = '<div class="empty-state"><span>暂无ROI矩形框</span></div>';
            } else {
                roiListEl.innerHTML = roiRectangles.map(r => {
                    const isSel = r.id === selectedRoiId;
                    return `
                        <div class="roi-item ${isSel ? 'selected' : ''}" data-roi-id="${r.id}">
                            <span class="roi-name" style="cursor:pointer;">${r.name}</span>
                            <span class="roi-coords">x:${r.x} y:${r.y} ${r.width}×${r.height}</span>
                            <div class="roi-actions">
                                <button class="btn btn-xs" data-action="select-roi" data-roi-id="${r.id}">📍</button>
                                <button class="btn btn-xs" data-action="delete-roi" data-roi-id="${r.id}" style="color:var(--danger);">×</button>
                            </div>
                        </div>`;
                }).join('');
            }
            updateRoiCount();
            bindRoiListEvents();
        }

        function updateRoiCount() {
            if (roiCountEl) roiCountEl.textContent = `${roiRectangles.length}个`;
            const templateCount = document.getElementById('templateCount');
            if (templateCount) templateCount.textContent = `${roiRectangles.length}个模板`;
        }

        function bindRoiListEvents() {
            roiListEl.querySelectorAll('.roi-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const rid = item.dataset.roiId;
                    selectedRoiId = rid;
                    renderRoiCanvas();
                    renderRoiList();
                });
            });
            roiListEl.querySelectorAll('[data-action="select-roi"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const rid = btn.dataset.roiId;
                    selectedRoiId = rid;
                    renderRoiCanvas();
                    renderRoiList();
                    const rect = roiRectangles.find(r => r.id === rid);
                    if (rect) {
                        const cx = (rect.x + rect.width / 2) * roiDisplayScale;
                        const cy = (rect.y + rect.height / 2) * roiDisplayScale;
                        roiWrapper.scrollTo({ left: Math.max(0, cx - roiWrapper.clientWidth / 2), top: Math
                                .max(0, cy - roiWrapper.clientHeight / 2),
                            behavior: 'smooth' });
                    }
                });
            });
            roiListEl.querySelectorAll('[data-action="delete-roi"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteRoi(btn.dataset.roiId);
                });
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (selectedRoiId && roiImage) {
                    deleteRoi(selectedRoiId);
                    e.preventDefault();
                }
            }
            if (e.key === 'Escape') {
                selectedRoiId = null;
                isDrawingRoi = false;
                isDraggingRoi = false;
                isResizingRoi = false;
                drawingRoiRect = null;
                renderRoiCanvas();
                renderRoiList();
            }
        });

        // ==================== ROI按钮事件 ====================
        document.getElementById('btnLoadImage')?.addEventListener('click', () => {
            document.getElementById('roiImageInput').click();
        });
        document.getElementById('roiImageInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    roiImage = img;
                    roiRectangles = [];
                    selectedRoiId = null;
                    updateRoiDisplay();
                    renderRoiList();
                    addLog('ROI图片已加载', 'info');
                    showToast('图片已加载，可在画布上拖拽绘制ROI');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        document.getElementById('btnClearRoi')?.addEventListener('click', () => {
            if (roiRectangles.length === 0) return;
            if (confirm('确定清除所有ROI矩形框吗？')) {
                roiRectangles = [];
                selectedRoiId = null;
                renderRoiCanvas();
                renderRoiList();
                addLog('所有ROI已清除', 'warn');
                showToast('所有ROI已清除');
            }
        });

        document.getElementById('btnExportRoi')?.addEventListener('click', () => {
            if (roiRectangles.length === 0) {
                showToast('没有可导出的ROI数据');
                return;
            }
            const data = {
                imageWidth: roiImageNaturalW,
                imageHeight: roiImageNaturalH,
                rectangles: roiRectangles.map(r => ({ id: r.id, name: r.name, x: r.x, y: r.y, width: r.width,
                    height: r.height }))
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'roi_data.json';
            a.click();
            URL.revokeObjectURL(url);
            addLog('ROI数据已导出', 'info');
            showToast('ROI数据已导出为JSON');
        });

        document.getElementById('btnImportRoi')?.addEventListener('click', () => {
            document.getElementById('roiJsonInput').click();
        });
        document.getElementById('roiJsonInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.rectangles && Array.isArray(data.rectangles)) {
                        data.rectangles.forEach(r => {
                            roiRectangles.push({
                                id: r.id || roiGenId(),
                                name: r.name || 'ROI',
                                x: r.x,
                                y: r.y,
                                width: r.width,
                                height: r.height
                            });
                        });
                        renderRoiCanvas();
                        renderRoiList();
                        addLog(`导入${data.rectangles.length}个ROI`, 'info');
                        showToast(`成功导入${data.rectangles.length}个ROI`);
                    }
                } catch (err) {
                    showToast('JSON解析失败');
                    addLog('ROI导入失败: ' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // ==================== 初始化 ====================
        function init() {
            loadTheme();
            switchNav('daily');
            renderLogs();
            refreshAdbStatus();
            updateRoiDisplay();
            renderRoiList();
            setInterval(refreshAdbStatus, 30000);
            addLog('ROI编辑器已就绪 - 可加载图片并拖拽标记矩形区域', 'info');
        }

        init();
        console.log('✅ ADB管理工具 v2 已就绪');
        console.log('  - 主题切换: 🌙暗色 / ☀️亮色 / 🔥暖色');
        console.log('  - ROI编辑器: 加载图片 → 拖拽绘制矩形 → 导出JSON');
    </script>
</body>
</html>
