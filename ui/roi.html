<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片模板编辑中心 - ROI标记工具</title>
    <style>
        :root {
            --bg: #1a1d23;
            --bg-panel: #21252b;
            --bg-card: #282c34;
            --bg-input: #1a1d23;
            --border: #3a3f4b;
            --text: #e0e0e0;
            --text-secondary: #a0a5b0;
            --accent: #4da6ff;
            --accent-hover: #3d8ed9;
            --danger: #e0556a;
            --danger-hover: #c94a5d;
            --success: #5cb878;
            --warning: #e5a845;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --radius: 10px;
            --radius-sm: 6px;
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ 顶部导航栏 ============ */
        .top-bar {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .top-bar .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .top-bar .logo span {
            color: var(--text);
            font-weight: 400;
            margin-left: 4px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .top-bar .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: 0.2px;
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .btn-accent:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(77, 166, 255, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(77, 166, 255, 0.05);
        }
        .btn-sm {
            padding: 6px 11px;
            font-size: 0.8rem;
            border-radius: 4px;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover {
            background: #4da36a;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 6px 10px;
        }
        .btn-ghost:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
        }
        .btn:disabled {
            opacity: 0.45;
            pointer-events: none;
            cursor: not-allowed;
        }
        .btn .icon {
            font-size: 1.1rem;
            line-height: 1;
        }

        /* 每行数量选择器 */
        .cols-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .cols-selector .col-option {
            width: 32px;
            height: 28px;
            border-radius: 4px;
            border: 1.5px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cols-selector .col-option.active {
            border-color: var(--accent);
            background: rgba(77, 166, 255, 0.15);
            color: var(--accent);
            font-weight: 600;
        }
        .cols-selector .col-option:hover {
            border-color: var(--accent);
        }

        /* ============ 主内容区 ============ */
        .main-content {
            padding: 20px 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 列表视图 */
        .list-view {}
        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .list-header .info {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .list-header .info strong {
            color: var(--text);
        }

        .screenshots-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(4, 1fr);
        }
        .screenshots-grid.cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }
        .screenshots-grid.cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        .screenshots-grid.cols-4 {
            grid-template-columns: repeat(4, 1fr);
        }
        .screenshots-grid.cols-5 {
            grid-template-columns: repeat(5, 1fr);
        }

        .screenshot-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }
        .screenshot-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .screenshot-card .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #111;
        }
        .screenshot-card .card-img-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1d23;
            color: var(--text-secondary);
            font-size: 2rem;
        }
        .screenshot-card .card-body {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .screenshot-card .card-id {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .screenshot-card .card-badge {
            font-size: 0.7rem;
            background: rgba(92, 184, 120, 0.2);
            color: var(--success);
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-weight: 500;
        }
        .screenshot-card .card-actions {
            display: flex;
            gap: 4px;
        }
        .screenshot-card .card-actions .btn {
            padding: 4px 8px;
            font-size: 0.7rem;
        }
        .screenshot-card.selected-for-export {
            border-color: var(--warning) !important;
            box-shadow: 0 0 0 3px rgba(229, 168, 69, 0.25);
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination .page-btn {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition);
        }
        .pagination .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        .pagination .page-btn:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent);
        }
        .pagination .page-info {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 0 8px;
        }

        /* ============ 详情视图 ============ */
        .detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg);
            flex-direction: row;
        }
        .detail-view.active {
            display: flex;
        }
        .detail-canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0f13;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .detail-canvas-area canvas {
            cursor: crosshair;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }
        .detail-canvas-area .zoom-info {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #ccc;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            pointer-events: none;
        }
        .detail-canvas-area .hint-overlay {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #ccc;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .detail-canvas-area .hint-overlay.fading {
            opacity: 0;
        }

        /* 右侧面板 */
        .detail-panel {
            width: 380px;
            min-width: 340px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
        }
        .detail-panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: sticky;
            top: 0;
            background: var(--bg-panel);
            z-index: 10;
        }
        .detail-panel-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .region-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .region-item {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }
        .region-item:hover {
            border-color: #666;
        }
        .region-item.selected {
            border-color: var(--accent) !important;
            background: rgba(77, 166, 255, 0.08);
            box-shadow: 0 0 12px rgba(77, 166, 255, 0.2);
        }
        .region-item .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .region-item .region-info {
            flex: 1;
            min-width: 0;
        }
        .region-item .region-name {
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .region-item .region-name input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.8rem;
            width: 100%;
            font-family: inherit;
        }
        .region-item .region-coords {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .region-item .region-actions {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }
        .region-item .region-actions .btn {
            padding: 3px 7px;
            font-size: 0.7rem;
            border-radius: 3px;
        }

        .detail-panel-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: sticky;
            bottom: 0;
            background: var(--bg-panel);
        }
        .detail-panel-footer .btn-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 1rem;
            margin: 4px 0;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.85rem;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
            pointer-events: auto;
            max-width: 400px;
        }
        .toast.success {
            border-left: 3px solid var(--success);
        }
        .toast.error {
            border-left: 3px solid var(--danger);
        }
        .toast.info {
            border-left: 3px solid var(--accent);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(60px);
            }
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .detail-view {
                flex-direction: column;
            }
            .detail-panel {
                width: 100%;
                min-width: 100%;
                max-height: 45vh;
                flex-shrink: 0;
            }
            .screenshots-grid {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }
        @media (max-width: 500px) {
            .screenshots-grid {
                grid-template-columns: 1fr !important;
            }
            .top-bar {
                padding: 10px 12px;
            }
            .btn {
                padding: 7px 10px;
                font-size: 0.8rem;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* 粘贴区域高亮 */
        .paste-zone-highlight {
            position: fixed;
            inset: 0;
            z-index: 150;
            background: rgba(77, 166, 255, 0.08);
            border: 3px dashed var(--accent);
            pointer-events: none;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .paste-zone-highlight.show {
            display: flex;
        }
    </style>
</head>
<body>

    <!-- 粘贴区域高亮 -->
    <div class="paste-zone-highlight" id="pasteZone">📋 松开以粘贴截图 (Ctrl+V)</div>

    <!-- Toast容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <div class="logo">🎯 模板编辑中心<span>ROI Marker</span></div>
        <div class="actions">
            <div class="cols-selector" id="colsSelector">
                <span>每行显示:</span>
                <button class="col-option" data-cols="2">2</button>
                <button class="col-option active" data-cols="3">3</button>
                <button class="col-option" data-cols="4">4</button>
                <button class="col-option" data-cols="5">5</button>
            </div>
            <button class="btn btn-accent" id="btnScreenshot" title="上传图片模拟ADB截图">
                <span class="icon">📸</span> 截图（上传图片）
            </button>
            <button class="btn btn-outline btn-sm" id="btnBatchImport" title="批量导入多张截图">
                <span class="icon">📥</span> 批量导入
            </button>
            <button class="btn btn-outline btn-sm" id="btnExportAll" title="导出所有截图的ROIJSON数据">
                <span class="icon">💾</span> 导出全部JSON
            </button>
            <button class="btn btn-ghost btn-sm" id="btnClearAll" title="清除所有数据">
                <span class="icon">🗑️</span> 清空
            </button>
        </div>
    </div>

    <!-- 主内容区 - 列表视图 -->
    <div class="main-content" id="listView">
        <div class="list-header">
            <span class="info">共 <strong id="totalCount">0</strong> 张截图 | 第 <strong id="pageRange">1</strong> 页</span>
        </div>
        <div class="screenshots-grid cols-3" id="screenshotsGrid"></div>
        <div class="pagination" id="pagination"></div>
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">📭</div>
            <p>还没有截图</p>
            <p style="font-size:0.8rem;">点击"截图"按钮上传图片，或直接粘贴(Ctrl+V)、拖拽图片到页面</p>
        </div>
    </div>

    <!-- 详情视图 -->
    <div class="detail-view" id="detailView">
        <div class="detail-canvas-area" id="canvasArea">
            <canvas id="mainCanvas"></canvas>
            <div class="hint-overlay" id="hintOverlay">🖱️ 拖拽绘制矩形框 | 点击矩形框选中 | 滚轮缩放</div>
            <div class="zoom-info" id="zoomInfo">100%</div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div class="detail-panel-header">
                <h3>📐 矩形框列表</h3>
                <button class="btn btn-outline btn-sm" id="btnBackToList">← 返回列表</button>
            </div>
            <div class="region-list" id="regionList">
                <div style="color:var(--text-secondary);text-align:center;padding:20px;font-size:0.85rem;">
                    暂无矩形框<br>在图片上拖拽绘制
                </div>
            </div>
            <div class="detail-panel-footer">
                <div class="btn-row">
                    <button class="btn btn-accent btn-sm" id="btnExportThis" style="flex:1;">💾 导出此截图JSON</button>
                    <button class="btn btn-success btn-sm" id="btnCropAll" style="flex:1;">✂️ 裁切全部小图</button>
                </div>
                <div class="btn-row">
                    <button class="btn btn-outline btn-sm" id="btnClearRegions" style="flex:1;">🗑️ 清除所有矩形框</button>
                </div>
                <div style="font-size:0.7rem;color:var(--text-secondary);text-align:center;margin-top:4px;">
                    截图ID: <span id="detailShotId" style="font-family:var(--font-mono);color:var(--accent);">-</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
    <input type="file" id="batchFileInput" accept="image/*" multiple style="display:none;">

    <script>
        (function() {
            // ==================== 全局状态 ====================
            const STORAGE_KEY = 'roi_marker_screenshots';
            const COLORS_POOL = [
                '#FF6B6B', '#FF9F43', '#FECA57', '#54A0FF', '#5F27CD',
                '#00D2D3', '#FF6FB7', '#48DBFB', '#FF9FF3', '#01A3A4',
                '#E056A0', '#F8A5C2', '#63CDDA', '#CF6A87', '#786FA6',
                '#F19066', '#E15F41', '#C44569', '#574B90', '#3DC1D3'
            ];
            let colorIndex = 0;

            // 截图数据数组
            let screenshots = [];
            // 当前详情页的截图索引
            let currentDetailIndex = -1;
            // 列表分页相关
            let currentPage = 1;
            let colsPerRow = 3;
            let itemsPerPage = 12; // 默认每页12个（与colsPerRow配合）
            // Canvas相关
            let canvasImg = null; // 当前加载的Image对象
            let canvasScale = 1; // 显示缩放比例
            let canvasOffsetX = 0;
            let canvasOffsetY = 0;
            let canvasZoom = 1; // 用户缩放级别
            // 矩形框交互状态
            let selectedRegionId = null; // 当前选中的矩形框ID
            let isDrawing = false;
            let isDragging = false;
            let drawStartX = 0;
            let drawStartY = 0;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            let currentDrawingRect = null; // 正在绘制的矩形（显示坐标）
            // 调整大小相关
            let isResizing = false;
            let resizeHandle = null; // 'nw','ne','sw','se','n','s','w','e'
            let resizeStartRect = null;
            let resizeStartMouse = null;

            // ==================== DOM引用 ====================
            const $listView = document.getElementById('listView');
            const $detailView = document.getElementById('detailView');
            const $screenshotsGrid = document.getElementById('screenshotsGrid');
            const $pagination = document.getElementById('pagination');
            const $emptyState = document.getElementById('emptyState');
            const $totalCount = document.getElementById('totalCount');
            const $pageRange = document.getElementById('pageRange');
            const $regionList = document.getElementById('regionList');
            const $mainCanvas = document.getElementById('mainCanvas');
            const $canvasArea = document.getElementById('canvasArea');
            const $zoomInfo = document.getElementById('zoomInfo');
            const $hintOverlay = document.getElementById('hintOverlay');
            const $detailShotId = document.getElementById('detailShotId');
            const $pasteZone = document.getElementById('pasteZone');
            const $toastContainer = document.getElementById('toastContainer');
            const $fileInput = document.getElementById('fileInput');
            const $batchFileInput = document.getElementById('batchFileInput');
            const $colsSelector = document.getElementById('colsSelector');

            // ==================== 工具函数 ====================
            function generateScreenshotId() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                const ms = String(now.getMilliseconds()).padStart(3, '0');
                return `shot_${y}${m}${d}_${h}${min}${s}_${ms}`;
            }

            function generateRegionId() {
                return 'roi_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);
            }

            function getNextColor() {
                const color = COLORS_POOL[colorIndex % COLORS_POOL.length];
                colorIndex++;
                return color;
            }

            function showToast(msg, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = msg;
                $toastContainer.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.remove();
                }, 2500);
            }

            function saveData() {
                try {
                    // 存储时压缩：将imageData单独处理
                    const dataToSave = screenshots.map(s => ({
                        id: s.id,
                        imageData: s.imageData,
                        createdAt: s.createdAt,
                        regions: s.regions,
                        originalWidth: s.originalWidth,
                        originalHeight: s.originalHeight,
                    }));
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(dataToSave));
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        showToast('存储空间不足！请清理旧截图或导出数据后删除', 'error');
                    } else {
                        showToast('保存失败: ' + e.message, 'error');
                    }
                }
            }

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        screenshots = JSON.parse(raw);
                        // 恢复颜色索引
                        let maxColorIdx = 0;
                        screenshots.forEach(s => {
                            if (!s.regions) s.regions = [];
                            if (!s.originalWidth) s.originalWidth = 1080;
                            if (!s.originalHeight) s.originalHeight = 2400;
                            s.regions.forEach(r => {
                                if (!r.id) r.id = generateRegionId();
                                if (!r.color) r.color = getNextColor();
                                const ci = COLORS_POOL.indexOf(r.color);
                                if (ci > maxColorIdx) maxColorIdx = ci;
                            });
                        });
                        colorIndex = maxColorIdx + 1;
                    } else {
                        screenshots = [];
                    }
                } catch (e) {
                    console.error('加载数据失败:', e);
                    screenshots = [];
                }
            }

            // ==================== Toast ====================
            function toast(msg, type) { showToast(msg, type); }

            // ==================== 图片加载 ====================
            function loadImageFromFile(file) {
                return new Promise((resolve, reject) => {
                    if (!file.type.startsWith('image/')) {
                        reject(new Error('请选择图片文件'));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const dataUrl = e.target.result;
                        const img = new Image();
                        img.onload = () => {
                            resolve({ dataUrl, img, width: img.naturalWidth, height: img.naturalHeight });
                        };
                        img.onerror = () => reject(new Error('图片加载失败'));
                        img.src = dataUrl;
                    };
                    reader.onerror = () => reject(new Error('文件读取失败'));
                    reader.readAsDataURL(file);
                });
            }

            function loadImageFromClipboard(clipboardItem) {
                return new Promise((resolve, reject) => {
                    const blob = clipboardItem.getAsFile ? clipboardItem.getAsFile() :
                        (clipboardItem.type ? clipboardItem : null);
                    if (!blob || !blob.type.startsWith('image/')) {
                        reject(new Error('剪贴板中没有图片'));
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const dataUrl = e.target.result;
                        const img = new Image();
                        img.onload = () => {
                            resolve({ dataUrl, img, width: img.naturalWidth, height: img.naturalHeight });
                        };
                        img.onerror = () => reject(new Error('图片加载失败'));
                        img.src = dataUrl;
                    };
                    reader.onerror = () => reject(new Error('读取剪贴板失败'));
                    reader.readAsDataURL(blob);
                });
            }

            // ==================== 添加截图 ====================
            async function addScreenshot(dataUrl, imgWidth, imgHeight) {
                const shot = {
                    id: generateScreenshotId(),
                    imageData: dataUrl,
                    createdAt: new Date().toISOString(),
                    regions: [],
                    originalWidth: imgWidth,
                    originalHeight: imgHeight,
                };
                screenshots.unshift(shot);
                saveData();
                currentPage = 1;
                renderList();
                toast('✅ 截图已添加: ' + shot.id, 'success');
                return screenshots.length - 1; // 返回索引（现在是0）
            }

            async function handleFileSelect(file) {
                try {
                    const { dataUrl, width, height } = await loadImageFromFile(file);
                    await addScreenshot(dataUrl, width, height);
                } catch (e) {
                    toast('❌ ' + e.message, 'error');
                }
            }

            async function handleBatchFiles(files) {
                let added = 0;
                for (const file of files) {
                    try {
                        const { dataUrl, width, height } = await loadImageFromFile(file);
                        await addScreenshot(dataUrl, width, height);
                        added++;
                    } catch (e) {
                        console.warn('跳过文件:', file.name, e.message);
                    }
                }
                if (added > 0) {
                    toast(`✅ 成功导入 ${added} 张截图`, 'success');
                } else {
                    toast('⚠️ 没有有效的图片文件', 'error');
                }
            }

            async function handleClipboardPaste(e) {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        try {
                            const { dataUrl, width, height } = await loadImageFromClipboard(item);
                            await addScreenshot(dataUrl, width, height);
                        } catch (err) {
                            toast('❌ 粘贴失败: ' + err.message, 'error');
                        }
                        return;
                    }
                }
            }

            // ==================== 渲染列表 ====================
            function renderList() {
                const total = screenshots.length;
                $totalCount.textContent = total;

                // 根据每行数量调整每页数量
                const perPage = Math.max(colsPerRow * 3, 6); // 至少保证3行
                itemsPerPage = perPage;
                const totalPages = Math.max(1, Math.ceil(total / itemsPerPage));
                if (currentPage > totalPages) currentPage = totalPages;
                const start = (currentPage - 1) * itemsPerPage;
                const end = Math.min(start + itemsPerPage, total);
                const pageItems = screenshots.slice(start, end);

                $pageRange.textContent = `${currentPage}/${totalPages}`;

                // 网格列数
                $screenshotsGrid.className = 'screenshots-grid cols-' + colsPerRow;

                // 渲染卡片
                if (total === 0) {
                    $screenshotsGrid.innerHTML = '';
                    $emptyState.style.display = 'block';
                    $pagination.innerHTML = '';
                } else {
                    $emptyState.style.display = 'none';
                    $screenshotsGrid.innerHTML = pageItems.map((s, i) => {
                        const realIndex = start + i;
                        const regionCount = s.regions ? s.regions.length : 0;
                        return `
                        <div class="screenshot-card" data-index="${realIndex}"
                             title="截图ID: ${escapeHtml(s.id)}&#10;矩形框: ${regionCount}个&#10;点击进入详情">
                            <img class="card-img" src="${s.imageData}" alt="${escapeHtml(s.id)}"
                                 loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                            <div class="card-img-placeholder" style="display:none;">🖼️</div>
                            <div class="card-body">
                                <span class="card-id" title="${escapeHtml(s.id)}">${escapeHtml(s.id)}</span>
                                ${regionCount > 0 ? `<span class="card-badge">${regionCount} 个ROI</span>` : '<span style="font-size:0.7rem;color:var(--text-secondary);">无标记</span>'}
                                <div class="card-actions">
                                    <button class="btn btn-outline btn-sm" data-action="detail" data-index="${realIndex}" title="编辑ROI">✏️</button>
                                    <button class="btn btn-ghost btn-sm" data-action="delete" data-index="${realIndex}" title="删除">🗑️</button>
                                </div>
                            </div>
                        </div>`;
                    }).join('');

                    // 分页
                    renderPagination(totalPages);
                }
            }

            function renderPagination(totalPages) {
                if (totalPages <= 1) {
                    $pagination.innerHTML = '';
                    return;
                }
                let html = '';
                html +=
                    `<button class="page-btn" data-page="1" ${currentPage===1?'disabled':''} title="首页">«</button>`;
                html +=
                    `<button class="page-btn" data-page="${currentPage-1}" ${currentPage<=1?'disabled':''} title="上一页">‹</button>`;

                const maxButtons = 7;
                let startP = Math.max(1, currentPage - Math.floor(maxButtons / 2));
                let endP = Math.min(totalPages, startP + maxButtons - 1);
                if (endP - startP < maxButtons - 1) startP = Math.max(1, endP - maxButtons + 1);

                if (startP > 1) {
                    html += `<button class="page-btn" data-page="1">1</button>`;
                    if (startP > 2) html += `<span class="page-info">…</span>`;
                }
                for (let p = startP; p <= endP; p++) {
                    html +=
                        `<button class="page-btn ${p===currentPage?'active':''}" data-page="${p}">${p}</button>`;
                }
                if (endP < totalPages) {
                    if (endP < totalPages - 1) html += `<span class="page-info">…</span>`;
                    html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
                }

                html +=
                    `<button class="page-btn" data-page="${currentPage+1}" ${currentPage>=totalPages?'disabled':''} title="下一页">›</button>`;
                html +=
                    `<button class="page-btn" data-page="${totalPages}" ${currentPage===totalPages?'disabled':''} title="末页">»</button>`;
                $pagination.innerHTML = html;
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 详情视图 ====================
            function openDetail(index) {
                if (index < 0 || index >= screenshots.length) return;
                currentDetailIndex = index;
                selectedRegionId = null;
                canvasZoom = 1;
                const shot = screenshots[index];
                $detailShotId.textContent = shot.id;
                $listView.style.display = 'none';
                $detailView.classList.add('active');
                document.body.style.overflow = 'hidden';

                // 加载图片
                canvasImg = new Image();
                canvasImg.onload = () => {
                    fitCanvasToImage();
                    renderCanvas();
                    renderRegionList();
                };
                canvasImg.src = shot.imageData;
                // 如果图片已缓存
                if (canvasImg.complete && canvasImg.naturalWidth > 0) {
                    fitCanvasToImage();
                    renderCanvas();
                    renderRegionList();
                }
            }

            function closeDetail() {
                $detailView.classList.remove('active');
                $listView.style.display = 'block';
                document.body.style.overflow = '';
                currentDetailIndex = -1;
                selectedRegionId = null;
                canvasImg = null;
                canvasZoom = 1;
                saveData();
                renderList();
            }

            function fitCanvasToImage() {
                if (!canvasImg || !$canvasArea) return;
                const areaW = $canvasArea.clientWidth - 20;
                const areaH = $canvasArea.clientHeight - 20;
                const imgW = canvasImg.naturalWidth;
                const imgH = canvasImg.naturalHeight;
                canvasScale = Math.min(areaW / imgW, areaH / imgH, 1);
                const displayW = imgW * canvasScale * canvasZoom;
                const displayH = imgH * canvasScale * canvasZoom;
                $mainCanvas.width = displayW;
                $mainCanvas.height = displayH;
                $mainCanvas.style.width = displayW + 'px';
                $mainCanvas.style.height = displayH + 'px';
                canvasOffsetX = 0;
                canvasOffsetY = 0;
                $zoomInfo.textContent = Math.round(canvasScale * canvasZoom * 100) + '%';
            }

            function getActualCoords(canvasX, canvasY) {
                // Canvas坐标 → 实际图片坐标
                const actualX = canvasX / (canvasScale * canvasZoom);
                const actualY = canvasY / (canvasScale * canvasZoom);
                return {
                    x: Math.round(Math.max(0, Math.min(actualX, canvasImg ? canvasImg.naturalWidth : 9999))),
                    y: Math.round(Math.max(0, Math.min(actualY, canvasImg ? canvasImg.naturalHeight : 9999))),
                };
            }

            function getCanvasCoords(actualX, actualY) {
                return {
                    x: actualX * canvasScale * canvasZoom,
                    y: actualY * canvasScale * canvasZoom,
                };
            }

            function getCanvasRect(region) {
                const topLeft = getCanvasCoords(region.x, region.y);
                const bottomRight = getCanvasCoords(region.x + region.width, region.y + region.height);
                return {
                    x: topLeft.x,
                    y: topLeft.y,
                    w: bottomRight.x - topLeft.x,
                    h: bottomRight.y - topLeft.y,
                };
            }

            function renderCanvas() {
                const canvas = $mainCanvas;
                const ctx = canvas.getContext('2d');
                const w = canvas.width;
                const h = canvas.height;
                ctx.clearRect(0, 0, w, h);

                if (!canvasImg) return;

                // 绘制图片
                ctx.drawImage(canvasImg, 0, 0, w, h);

                if (currentDetailIndex < 0 || currentDetailIndex >= screenshots.length) return;
                const shot = screenshots[currentDetailIndex];
                const regions = shot.regions || [];

                // 绘制所有矩形框
                regions.forEach(region => {
                    const rect = getCanvasRect(region);
                    const isSelected = region.id === selectedRegionId;

                    // 填充（半透明）
                    ctx.fillStyle = hexToRgba(region.color, isSelected ? 0.3 : 0.15);
                    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

                    // 边框
                    ctx.strokeStyle = isSelected ? '#FFFFFF' : region.color;
                    ctx.lineWidth = isSelected ? 3 : 2;
                    ctx.setLineDash(isSelected ? [] : [6, 3]);
                    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
                    ctx.setLineDash([]);

                    // 标签
                    const label = region.name || region.id;
                    const fontSize = Math.max(11, Math.min(14, rect.w / label.length * 1.8));
                    ctx.font = `bold ${fontSize}px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif`;
                    const textMetrics = ctx.measureText(label);
                    const textW = textMetrics.width + 8;
                    const textH = fontSize + 6;
                    let labelY = rect.y - textH - 2;
                    if (labelY < 0) labelY = rect.y + 2;
                    const labelX = rect.x;

                    ctx.fillStyle = region.color;
                    ctx.fillRect(labelX, labelY, textW, textH);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillText(label, labelX + 4, labelY + fontSize);

                    // 选中状态的手柄
                    if (isSelected) {
                        drawResizeHandles(ctx, rect);
                    }
                });

                // 正在绘制的矩形
                if (currentDrawingRect && isDrawing) {
                    const dr = currentDrawingRect;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(dr.x, dr.y, dr.w, dr.h);
                    ctx.strokeStyle = '#FFFFFF';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.strokeRect(dr.x, dr.y, dr.w, dr.h);
                    ctx.setLineDash([]);
                }
            }

            function drawResizeHandles(ctx, rect) {
                const handleSize = 8;
                const handles = [
                    { x: rect.x, y: rect.y, cursor: 'nw' }, // 左上
                    { x: rect.x + rect.w, y: rect.y, cursor: 'ne' }, // 右上
                    { x: rect.x, y: rect.y + rect.h, cursor: 'sw' }, // 左下
                    { x: rect.x + rect.w, y: rect.y + rect.h, cursor: 'se' }, // 右下
                    { x: rect.x + rect.w / 2, y: rect.y, cursor: 'n' }, // 上中
                    { x: rect.x + rect.w / 2, y: rect.y + rect.h, cursor: 's' }, // 下中
                    { x: rect.x, y: rect.y + rect.h / 2, cursor: 'w' }, // 左中
                    { x: rect.x + rect.w, y: rect.y + rect.h / 2, cursor: 'e' }, // 右中
                ];
                handles.forEach(h => {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1.5;
                    ctx.fillRect(h.x - handleSize / 2, h.y - handleSize / 2, handleSize, handleSize);
                    ctx.strokeRect(h.x - handleSize / 2, h.y - handleSize / 2, handleSize, handleSize);
                });
            }

            function hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r},${g},${b},${alpha})`;
            }

            // 检测鼠标在哪个调整手柄上
            function detectResizeHandle(canvasX, canvasY) {
                if (!selectedRegionId || currentDetailIndex < 0) return null;
                const shot = screenshots[currentDetailIndex];
                const region = shot.regions.find(r => r.id === selectedRegionId);
                if (!region) return null;
                const rect = getCanvasRect(region);
                const handleSize = 8;
                const threshold = handleSize + 4;
                const handles = [
                    { x: rect.x, y: rect.y, cursor: 'nw' },
                    { x: rect.x + rect.w, y: rect.y, cursor: 'ne' },
                    { x: rect.x, y: rect.y + rect.h, cursor: 'sw' },
                    { x: rect.x + rect.w, y: rect.y + rect.h, cursor: 'se' },
                    { x: rect.x + rect.w / 2, y: rect.y, cursor: 'n' },
                    { x: rect.x + rect.w / 2, y: rect.y + rect.h, cursor: 's' },
                    { x: rect.x, y: rect.y + rect.h / 2, cursor: 'w' },
                    { x: rect.x + rect.w, y: rect.y + rect.h / 2, cursor: 'e' },
                ];
                for (const h of handles) {
                    if (Math.abs(canvasX - h.x) < threshold && Math.abs(canvasY - h.y) < threshold) {
                        return h.cursor;
                    }
                }
                return null;
            }

            function isInsideRegion(canvasX, canvasY, region) {
                const rect = getCanvasRect(region);
                return canvasX >= rect.x && canvasX <= rect.x + rect.w &&
                    canvasY >= rect.y && canvasY <= rect.y + rect.h;
            }

            function findRegionAtCanvasPos(canvasX, canvasY) {
                if (currentDetailIndex < 0) return null;
                const shot = screenshots[currentDetailIndex];
                // 从上层开始查找（最后绘制的在最上面）
                const regions = shot.regions || [];
                for (let i = regions.length - 1; i >= 0; i--) {
                    if (isInsideRegion(canvasX, canvasY, regions[i])) {
                        return regions[i];
                    }
                }
                return null;
            }

            // ==================== Canvas事件处理 ====================
            function getCanvasEventPos(e) {
                const rect = $mainCanvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top,
                };
            }

            $mainCanvas.addEventListener('mousedown', (e) => {
                if (currentDetailIndex < 0) return;
                const pos = getCanvasEventPos(e);
                const canvasX = pos.x;
                const canvasY = pos.y;

                // 检查是否在调整手柄上
                if (selectedRegionId) {
                    const handle = detectResizeHandle(canvasX, canvasY);
                    if (handle) {
                        isResizing = true;
                        resizeHandle = handle;
                        const shot = screenshots[currentDetailIndex];
                        const region = shot.regions.find(r => r.id === selectedRegionId);
                        if (region) {
                            resizeStartRect = { x: region.x, y: region.y, width: region.width, height: region
                                    .height };
                            resizeStartMouse = getActualCoords(canvasX, canvasY);
                        }
                        e.preventDefault();
                        return;
                    }
                }

                // 检查是否点击在已有矩形框内
                const clickedRegion = findRegionAtCanvasPos(canvasX, canvasY);
                if (clickedRegion) {
                    selectedRegionId = clickedRegion.id;
                    // 准备拖拽
                    isDragging = true;
                    const actual = getActualCoords(canvasX, canvasY);
                    dragOffsetX = actual.x - clickedRegion.x;
                    dragOffsetY = actual.y - clickedRegion.y;
                    renderCanvas();
                    renderRegionList();
                    e.preventDefault();
                    return;
                }

                // 开始绘制新矩形
                selectedRegionId = null;
                isDrawing = true;
                const actual = getActualCoords(canvasX, canvasY);
                drawStartX = actual.x;
                drawStartY = actual.y;
                currentDrawingRect = { x: canvasX, y: canvasY, w: 0, h: 0 };
                renderCanvas();
                renderRegionList();
                e.preventDefault();
            });

            $mainCanvas.addEventListener('mousemove', (e) => {
                if (currentDetailIndex < 0) return;
                const pos = getCanvasEventPos(e);
                const canvasX = pos.x;
                const canvasY = pos.y;

                if (isResizing && resizeHandle && resizeStartRect && resizeStartMouse) {
                    const actual = getActualCoords(canvasX, canvasY);
                    const dx = actual.x - resizeStartMouse.x;
                    const dy = actual.y - resizeStartMouse.y;
                    const shot = screenshots[currentDetailIndex];
                    const region = shot.regions.find(r => r.id === selectedRegionId);
                    if (!region) return;
                    let newX = resizeStartRect.x;
                    let newY = resizeStartRect.y;
                    let newW = resizeStartRect.width;
                    let newH = resizeStartRect.height;

                    switch (resizeHandle) {
                        case 'nw':
                            newX = resizeStartRect.x + dx;
                            newY = resizeStartRect.y + dy;
                            newW = resizeStartRect.width - dx;
                            newH = resizeStartRect.height - dy;
                            break;
                        case 'ne':
                            newY = resizeStartRect.y + dy;
                            newW = resizeStartRect.width + dx;
                            newH = resizeStartRect.height - dy;
                            break;
                        case 'sw':
                            newX = resizeStartRect.x + dx;
                            newW = resizeStartRect.width - dx;
                            newH = resizeStartRect.height + dy;
                            break;
                        case 'se':
                            newW = resizeStartRect.width + dx;
                            newH = resizeStartRect.height + dy;
                            break;
                        case 'n':
                            newY = resizeStartRect.y + dy;
                            newH = resizeStartRect.height - dy;
                            break;
                        case 's':
                            newH = resizeStartRect.height + dy;
                            break;
                        case 'w':
                            newX = resizeStartRect.x + dx;
                            newW = resizeStartRect.width - dx;
                            break;
                        case 'e':
                            newW = resizeStartRect.width + dx;
                            break;
                    }
                    // 确保最小尺寸
                    if (newW < 5) { newW = 5; if (resizeHandle.includes('w')) newX = resizeStartRect.x +
                            resizeStartRect.width - 5; }
                    if (newH < 5) { newH = 5; if (resizeHandle.includes('n')) newY = resizeStartRect.y +
                            resizeStartRect.height - 5; }
                    // 确保不超出图片边界
                    newX = Math.max(0, newX);
                    newY = Math.max(0, newY);
                    if (newX + newW > (canvasImg?.naturalWidth || 9999)) newW = (canvasImg?.naturalWidth || 9999) -
                        newX;
                    if (newY + newH > (canvasImg?.naturalHeight || 9999)) newH = (canvasImg?.naturalHeight || 9999) -
                        newY;

                    region.x = Math.round(newX);
                    region.y = Math.round(newY);
                    region.width = Math.round(newW);
                    region.height = Math.round(newH);
                    saveData();
                    renderCanvas();
                    renderRegionList();
                    updateCanvasCursor(canvasX, canvasY);
                    return;
                }

                if (isDragging && selectedRegionId) {
                    const shot = screenshots[currentDetailIndex];
                    const region = shot.regions.find(r => r.id === selectedRegionId);
                    if (region) {
                        const actual = getActualCoords(canvasX, canvasY);
                        let newX = actual.x - dragOffsetX;
                        let newY = actual.y - dragOffsetY;
                        newX = Math.max(0, Math.min(newX, (canvasImg?.naturalWidth || 9999) - region.width));
                        newY = Math.max(0, Math.min(newY, (canvasImg?.naturalHeight || 9999) - region.height));
                        region.x = Math.round(newX);
                        region.y = Math.round(newY);
                        saveData();
                        renderCanvas();
                        renderRegionList();
                    }
                    return;
                }

                if (isDrawing) {
                    const actual = getActualCoords(canvasX, canvasY);
                    const startCanvas = getCanvasCoords(drawStartX, drawStartY);
                    const currentCanvas = getCanvasCoords(actual.x, actual.y);
                    currentDrawingRect = {
                        x: Math.min(startCanvas.x, currentCanvas.x),
                        y: Math.min(startCanvas.y, currentCanvas.y),
                        w: Math.abs(currentCanvas.x - startCanvas.x),
                        h: Math.abs(currentCanvas.y - startCanvas.y),
                    };
                    renderCanvas();
                    return;
                }

                // 更新光标
                updateCanvasCursor(canvasX, canvasY);
            });

            function updateCanvasCursor(canvasX, canvasY) {
                if (isResizing || isDragging || isDrawing) return;
                if (selectedRegionId) {
                    const handle = detectResizeHandle(canvasX, canvasY);
                    if (handle) {
                        const cursorMap = {
                            'nw': 'nw-resize',
                            'ne': 'ne-resize',
                            'sw': 'sw-resize',
                            'se': 'se-resize',
                            'n': 'n-resize',
                            's': 's-resize',
                            'w': 'w-resize',
                            'e': 'e-resize'
                        };
                        $mainCanvas.style.cursor = cursorMap[handle] || 'crosshair';
                        return;
                    }
                }
                const hovered = findRegionAtCanvasPos(canvasX, canvasY);
                if (hovered) {
                    $mainCanvas.style.cursor = 'move';
                } else {
                    $mainCanvas.style.cursor = 'crosshair';
                }
            }

            $mainCanvas.addEventListener('mouseup', (e) => {
                if (isResizing) {
                    isResizing = false;
                    resizeHandle = null;
                    resizeStartRect = null;
                    resizeStartMouse = null;
                    saveData();
                    renderCanvas();
                    renderRegionList();
                    return;
                }
                if (isDragging) {
                    isDragging = false;
                    saveData();
                    renderCanvas();
                    renderRegionList();
                    return;
                }
                if (isDrawing && currentDrawingRect) {
                    isDrawing = false;
                    const pos = getCanvasEventPos(e);
                    const actualStart = getActualCoords(
                        currentDrawingRect.x,
                        currentDrawingRect.y
                    );
                    const actualEnd = getActualCoords(
                        currentDrawingRect.x + currentDrawingRect.w,
                        currentDrawingRect.y + currentDrawingRect.h
                    );
                    const actualW = actualEnd.x - actualStart.x;
                    const actualH = actualEnd.y - actualStart.y;
                    if (actualW >= 3 && actualH >= 3) {
                        const shot = screenshots[currentDetailIndex];
                        const newRegion = {
                            id: generateRegionId(),
                            name: 'ROI_' + (shot.regions.length + 1),
                            x: actualStart.x,
                            y: actualStart.y,
                            width: actualW,
                            height: actualH,
                            color: getNextColor(),
                        };
                        shot.regions.push(newRegion);
                        selectedRegionId = newRegion.id;
                        saveData();
                        renderCanvas();
                        renderRegionList();
                        toast('✅ 矩形框已添加: ' + newRegion.name, 'success');
                    }
                    currentDrawingRect = null;
                    renderCanvas();
                }
            });

            $mainCanvas.addEventListener('mouseleave', () => {
                if (isDrawing) {
                    // 取消绘制
                    isDrawing = false;
                    currentDrawingRect = null;
                    renderCanvas();
                }
                if (isDragging) {
                    isDragging = false;
                    saveData();
                    renderCanvas();
                }
                if (isResizing) {
                    isResizing = false;
                    resizeHandle = null;
                    resizeStartRect = null;
                    resizeStartMouse = null;
                    saveData();
                    renderCanvas();
                }
                $mainCanvas.style.cursor = 'crosshair';
            });

            // 滚轮缩放
            $canvasArea.addEventListener('wheel', (e) => {
                if (currentDetailIndex < 0) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newZoom = Math.max(0.3, Math.min(3, canvasZoom + delta));
                if (Math.abs(newZoom - canvasZoom) > 0.001) {
                    canvasZoom = newZoom;
                    fitCanvasToImage();
                    renderCanvas();
                }
            }, { passive: false });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if ($detailView.classList.contains('active')) {
                    if (e.key === 'Escape') {
                        closeDetail();
                    }
                    if (e.key === 'Delete' || e.key === 'Backspace') {
                        if (selectedRegionId && currentDetailIndex >= 0) {
                            // 避免在输入框中触发
                            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
                            e.preventDefault();
                            deleteSelectedRegion();
                        }
                    }
                }
            });

            function deleteSelectedRegion() {
                if (currentDetailIndex < 0 || !selectedRegionId) return;
                const shot = screenshots[currentDetailIndex];
                const idx = shot.regions.findIndex(r => r.id === selectedRegionId);
                if (idx >= 0) {
                    const name = shot.regions[idx].name;
                    shot.regions.splice(idx, 1);
                    selectedRegionId = shot.regions.length > 0 ?
                        shot.regions[Math.min(idx, shot.regions.length - 1)].id :
                        null;
                    saveData();
                    renderCanvas();
                    renderRegionList();
                    toast('🗑️ 已删除: ' + name, 'info');
                }
            }

            // ==================== 矩形框列表渲染 ====================
            function renderRegionList() {
                if (currentDetailIndex < 0 || currentDetailIndex >= screenshots.length) {
                    $regionList.innerHTML =
                        '<div style="color:var(--text-secondary);text-align:center;padding:20px;">无数据</div>';
                    return;
                }
                const shot = screenshots[currentDetailIndex];
                const regions = shot.regions || [];

                if (regions.length === 0) {
                    $regionList.innerHTML =
                        '<div style="color:var(--text-secondary);text-align:center;padding:20px;font-size:0.85rem;">暂无矩形框<br>在图片上拖拽绘制</div>';
                } else {
                    $regionList.innerHTML = regions.map((r, i) => `
                        <div class="region-item ${r.id===selectedRegionId?'selected':''}"
                             data-region-id="${r.id}" title="点击选中 | 拖拽移动 | 滚轮缩放">
                            <span class="color-dot" style="background:${r.color};" title="颜色标识"></span>
                            <div class="region-info">
                                <div class="region-name">
                                    <input type="text" value="${escapeHtml(r.name)}"
                                           data-region-id="${r.id}"
                                           data-field="name"
                                           title="修改名称"
                                           style="width:100%;">
                                </div>
                                <div class="region-coords">
                                    (${r.x}, ${r.y}) ${r.width}×${r.height}
                                </div>
                            </div>
                            <div class="region-actions">
                                <button class="btn btn-outline btn-sm" data-action="select-region" data-region-id="${r.id}" title="在画布上选中">🎯</button>
                                <button class="btn btn-ghost btn-sm" data-action="delete-region" data-region-id="${r.id}" title="删除">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                }
            }

            // 矩形框列表事件委托
            $regionList.addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (!btn) {
                    // 点击整个item选中
                    const item = e.target.closest('.region-item');
                    if (item) {
                        const rid = item.dataset.regionId;
                        if (rid) {
                            selectedRegionId = rid;
                            renderCanvas();
                            renderRegionList();
                        }
                    }
                    return;
                }
                const rid = btn.dataset.regionId;
                if (!rid) return;
                const action = btn.dataset.action;
                if (action === 'select-region') {
                    selectedRegionId = rid;
                    renderCanvas();
                    renderRegionList();
                    toast('🎯 已选中矩形框', 'info');
                } else if (action === 'delete-region') {
                    if (currentDetailIndex >= 0) {
                        const shot = screenshots[currentDetailIndex];
                        const region = shot.regions.find(r => r.id === rid);
                        if (region && confirm(`确定删除矩形框 "${region.name}" 吗？`)) {
                            const idx = shot.regions.findIndex(r => r.id === rid);
                            shot.regions.splice(idx, 1);
                            if (selectedRegionId === rid) {
                                selectedRegionId = shot.regions.length > 0 ? shot.regions[Math.min(idx, shot
                                    .regions.length - 1)].id : null;
                            }
                            saveData();
                            renderCanvas();
                            renderRegionList();
                            toast('🗑️ 已删除', 'info');
                        }
                    }
                }
            });

            // 矩形框名称修改
            $regionList.addEventListener('input', (e) => {
                if (e.target.dataset.field === 'name') {
                    const rid = e.target.dataset.regionId;
                    if (rid && currentDetailIndex >= 0) {
                        const shot = screenshots[currentDetailIndex];
                        const region = shot.regions.find(r => r.id === rid);
                        if (region) {
                            region.name = e.target.value || 'ROI';
                            saveData();
                            renderCanvas();
                        }
                    }
                }
            });

            // ==================== 列表事件委托 ====================
            $screenshotsGrid.addEventListener('click', (e) => {
                const card = e.target.closest('.screenshot-card');
                const btn = e.target.closest('button');
                if (!card && !btn) return;

                if (btn) {
                    const action = btn.dataset.action;
                    const index = parseInt(btn.dataset.index);
                    if (isNaN(index)) return;
                    if (action === 'detail') {
                        openDetail(index);
                    } else if (action === 'delete') {
                        if (confirm(`确定删除截图 "${screenshots[index].id}" 及其所有ROI数据吗？此操作不可恢复。`)) {
                            screenshots.splice(index, 1);
                            if (currentDetailIndex === index) closeDetail();
                            if (currentDetailIndex > index) currentDetailIndex--;
                            saveData();
                            renderList();
                            toast('🗑️ 截图已删除', 'info');
                        }
                    }
                    return;
                }

                // 点击卡片进入详情
                if (card) {
                    const index = parseInt(card.dataset.index);
                    if (!isNaN(index)) {
                        openDetail(index);
                    }
                }
            });

            // 分页事件
            $pagination.addEventListener('click', (e) => {
                const btn = e.target.closest('.page-btn');
                if (!btn || btn.disabled) return;
                const page = parseInt(btn.dataset.page);
                if (!isNaN(page) && page >= 1) {
                    const totalPages = Math.max(1, Math.ceil(screenshots.length / itemsPerPage));
                    if (page <= totalPages) {
                        currentPage = page;
                        renderList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            });

            // ==================== 按钮事件 ====================
            document.getElementById('btnScreenshot').addEventListener('click', () => {
                $fileInput.click();
            });
            $fileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    handleFileSelect(files[0]);
                    $fileInput.value = '';
                }
            });

            document.getElementById('btnBatchImport').addEventListener('click', () => {
                $batchFileInput.click();
            });
            $batchFileInput.addEventListener('change', (e) => {
                const files = e.target.files;
                if (files.length > 0) {
                    handleBatchFiles(files);
                    $batchFileInput.value = '';
                }
            });

            document.getElementById('btnBackToList').addEventListener('click', closeDetail);

            document.getElementById('btnExportAll').addEventListener('click', exportAllJSON);
            document.getElementById('btnExportThis').addEventListener('click', exportCurrentJSON);
            document.getElementById('btnCropAll').addEventListener('click', cropAllRegions);
            document.getElementById('btnClearRegions').addEventListener('click', clearAllRegions);
            document.getElementById('btnClearAll').addEventListener('click', clearAllData);

            // 每行数量选择
            $colsSelector.addEventListener('click', (e) => {
                const btn = e.target.closest('.col-option');
                if (!btn) return;
                const cols = parseInt(btn.dataset.cols);
                if (!isNaN(cols) && cols >= 2 && cols <= 5) {
                    colsPerRow = cols;
                    $colsSelector.querySelectorAll('.col-option').forEach(b => b.classList.remove(
                        'active'));
                    btn.classList.add('active');
                    currentPage = 1;
                    renderList();
                    localStorage.setItem('roi_marker_cols', cols);
                }
            });

            // 全局粘贴事件
            document.addEventListener('paste', handleClipboardPaste);

            // 全局拖拽事件
            document.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (!$detailView.classList.contains('active')) {
                    $pasteZone.classList.add('show');
                }
            });
            document.addEventListener('dragleave', (e) => {
                if (e.target === document.documentElement || e.target === document.body) {
                    $pasteZone.classList.remove('show');
                }
            });
            document.addEventListener('drop', async (e) => {
                e.preventDefault();
                $pasteZone.classList.remove('show');
                if ($detailView.classList.contains('active')) return;
                const files = e.dataTransfer?.files;
                if (files && files.length > 0) {
                    if (files.length === 1 && files[0].type.startsWith('image/')) {
                        await handleFileSelect(files[0]);
                    } else {
                        await handleBatchFiles(Array.from(files).filter(f => f.type.startsWith('image/')));
                    }
                }
            });

            // ==================== 导出功能 ====================
            function exportAllJSON() {
                if (screenshots.length === 0) {
                    toast('⚠️ 没有截图数据可导出', 'error');
                    return;
                }
                // 导出所有截图的ROI数据为一个JSON文件
                const exportData = screenshots.map(s => ({
                    screenshotId: s.id,
                    createdAt: s.createdAt,
                    originalWidth: s.originalWidth,
                    originalHeight: s.originalHeight,
                    regionCount: s.regions.length,
                    regions: s.regions.map(r => ({
                        id: r.id,
                        name: r.name,
                        x: r.x,
                        y: r.y,
                        width: r.width,
                        height: r.height,
                        color: r.color,
                    })),
                }));
                downloadJSON(exportData, 'all_screenshots_roi.json');
                toast('✅ 全部ROI数据已导出', 'success');
            }

            function exportCurrentJSON() {
                if (currentDetailIndex < 0 || currentDetailIndex >= screenshots.length) {
                    toast('⚠️ 请先打开截图详情', 'error');
                    return;
                }
                const s = screenshots[currentDetailIndex];
                const exportData = {
                    screenshotId: s.id,
                    createdAt: s.createdAt,
                    originalWidth: s.originalWidth,
                    originalHeight: s.originalHeight,
                    regionCount: s.regions.length,
                    regions: s.regions.map(r => ({
                        id: r.id,
                        name: r.name,
                        x: r.x,
                        y: r.y,
                        width: r.width,
                        height: r.height,
                        color: r.color,
                    })),
                };
                downloadJSON(exportData, `${s.id}_roi.json`);
                toast('✅ 截图ROI数据已导出: ' + s.id, 'success');
            }

            function downloadJSON(data, filename) {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ==================== 裁切小图 ====================
            function cropAllRegions() {
                if (currentDetailIndex < 0 || currentDetailIndex >= screenshots.length) {
                    toast('⚠️ 请先打开截图详情', 'error');
                    return;
                }
                const shot = screenshots[currentDetailIndex];
                if (shot.regions.length === 0) {
                    toast('⚠️ 该截图没有矩形框可裁切', 'error');
                    return;
                }
                if (!canvasImg || !canvasImg.complete) {
                    toast('⚠️ 图片尚未加载完成', 'error');
                    return;
                }
                // 为每个ROI裁切小图并触发下载
                shot.regions.forEach((region, i) => {
                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = region.width;
                    cropCanvas.height = region.height;
                    const ctx = cropCanvas.getContext('2d');
                    ctx.drawImage(
                        canvasImg,
                        region.x, region.y, region.width, region.height,
                        0, 0, region.width, region.height
                    );
                    const dataUrl = cropCanvas.toDataURL('image/png');
                    const a = document.createElement('a');
                    a.href = dataUrl;
                    a.download = `${shot.id}_${region.name}_${region.x}_${region.y}_${region.width}x${region.height}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                });
                toast(`✅ 已裁切并下载 ${shot.regions.length} 张小图`, 'success');
            }

            function clearAllRegions() {
                if (currentDetailIndex < 0) return;
                const shot = screenshots[currentDetailIndex];
                if (shot.regions.length === 0) {
                    toast('⚠️ 没有矩形框可清除', 'error');
                    return;
                }
                if (confirm(`确定清除该截图的所有 ${shot.regions.length} 个矩形框吗？`)) {
                    shot.regions = [];
                    selectedRegionId = null;
                    saveData();
                    renderCanvas();
                    renderRegionList();
                    toast('🗑️ 所有矩形框已清除', 'info');
                }
            }

            function clearAllData() {
                if (screenshots.length === 0) {
                    toast('⚠️ 没有数据可清空', 'error');
                    return;
                }
                if (confirm(`确定清空所有 ${screenshots.length} 张截图及其ROI数据吗？\n\n此操作不可恢复！建议先导出JSON备份。`)) {
                    screenshots = [];
                    currentDetailIndex = -1;
                    selectedRegionId = null;
                    currentPage = 1;
                    localStorage.removeItem(STORAGE_KEY);
                    if ($detailView.classList.contains('active')) closeDetail();
                    renderList();
                    toast('🗑️ 所有数据已清空', 'info');
                }
            }

            // ==================== 窗口大小调整 ====================
            let resizeDebounce = null;
            window.addEventListener('resize', () => {
                if ($detailView.classList.contains('active')) {
                    clearTimeout(resizeDebounce);
                    resizeDebounce = setTimeout(() => {
                        fitCanvasToImage();
                        renderCanvas();
                    }, 200);
                }
            });

            // ==================== 初始化 ====================
            function init() {
                loadData();
                // 恢复每行数量设置
                const savedCols = localStorage.getItem('roi_marker_cols');
                if (savedCols && ['2', '3', '4', '5'].includes(savedCols)) {
                    colsPerRow = parseInt(savedCols);
                    $colsSelector.querySelectorAll('.col-option').forEach(b => {
                        b.classList.toggle('active', parseInt(b.dataset.cols) === colsPerRow);
                    });
                }
                currentPage = 1;
                renderList();

                // 隐藏提示的定时器
                setTimeout(() => {
                    if ($hintOverlay) $hintOverlay.classList.add('fading');
                }, 8000);
            }

            init();
            console.log('✅ 图片模板编辑中心已就绪');
            console.log('   📸 点击"截图"按钮上传图片');
            console.log('   📋 支持Ctrl+V粘贴截图');
            console.log('   🖱️ 拖拽图片到页面');
            console.log('   ✏️ 在详情页拖拽绘制矩形框');
            console.log('   💾 导出JSON或裁切小图');
            console.log('   ⌨️ 快捷键: Esc返回, Delete删除选中矩形框');
        })();
    </script>
</body>
</html>
